services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sales_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # NOTE: deliberately NOT publishing 5432 to the host. The `app` service
    # reaches `db` on Docker's internal network via `db:5432`. Publishing
    # would expose Postgres to the public internet if the host firewall is
    # ever misconfigured. If you need direct DB access, use
    # `docker compose exec db psql ...` or port-forward via SSH tunnel.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/sales_tracker
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      APP_PASSWORD: ${APP_PASSWORD:-}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      CRON_SECRET: ${CRON_SECRET:-}
      # Cron checks `now.getHours() === 20` for the 8 PM auto-process. Default
      # container TZ is UTC, so 8 PM UTC = 1:30 AM IST — wrong. Set IST so the
      # check fires when sales reps expect it.
      TZ: Asia/Kolkata
    volumes:
      # Persist WhatsApp auth across container rebuilds so users don't have to
      # re-pair every deploy. disconnect()/loggedOut wipes still apply.
      - ./baileys_auth:/app/.baileys_auth
    depends_on:
      db:
        condition: service_healthy
    # --accept-data-loss is intentional: the Visit table added a nullable
    # `raw_text_hash` column with @@unique(executive_id, visit_date, raw_text_hash).
    # Existing rows have NULL hashes; Postgres treats NULLs as distinct, so the
    # constraint adds cleanly. Prisma warns anyway; we accept.
    command: >
      sh -c "npx prisma@6 db push --skip-generate --accept-data-loss && node server.js"

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://app:3000
    depends_on:
      - app

volumes:
  pgdata:

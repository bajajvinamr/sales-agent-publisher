name: Nightly Google Sheet Sync (safety net)

on:
  schedule:
    # 21:00 IST = 15:30 UTC — nightly safety net
    - cron: '30 15 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL or CRON_SECRET secret not set" >&2
            exit 1
          fi

          RESPONSE=$(curl -sS -w "\nHTTP %{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/sync-sheet")

          echo "$RESPONSE"

          STATUS=$(echo "$RESPONSE" | tail -n 1 | awk '{print $2}')
          if [ "$STATUS" != "200" ]; then
            exit 1
          fi

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sales_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/sales_tracker
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      APP_PASSWORD: ${APP_PASSWORD:-}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      CRON_SECRET: ${CRON_SECRET:-}
    volumes:
      # Persist WhatsApp auth across container rebuilds so users don't have to
      # re-pair every deploy. disconnect()/loggedOut wipes still apply.
      - ./baileys_auth:/app/.baileys_auth
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma@6 db push --skip-generate && node server.js"

  # Stable HTTPS URL via Tailscale Funnel.
  # URL ends up as https://${TS_HOSTNAME}.<your-tailnet>.ts.net
  # Requires TS_AUTHKEY in .env (generate at https://login.tailscale.com/admin/settings/keys)
  tailscale:
    image: tailscale/tailscale:latest
    hostname: salestracker
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_HOSTNAME: salestracker
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale-config:/config
    depends_on:
      - app
    restart: unless-stopped

  # Quick-tunnel fallback. Rotates URL on every restart, useful if Tailscale
  # auth lapses. Comment out once Tailscale is proven stable.
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://app:3000
    depends_on:
      - app

volumes:
  pgdata:
  tailscale-state:
